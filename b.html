<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Snap | Inventory Scanner</title>
    <!-- Tailwind CSS for modern "Base44" vibe -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-6 shadow-lg">
        <h1 class="text-2xl font-bold">Satisfied Stock Snap</h1>
        <p class="text-sm opacity-80">Scan. Stock. Snap. Success.</p>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- Scanner Section -->
        <section class="bg-white rounded-2xl shadow-sm p-4 overflow-hidden border border-gray-100">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                📸 <span id="scanner-status">Ready to Scan</span>
            </h2>
            <div id="reader" class="rounded-xl bg-gray-100 border-2 border-dashed border-gray-300"></div>
            
            <div id="result-card" class="mt-4 p-4 bg-indigo-50 rounded-xl hidden">
                <p class="text-xs text-indigo-400 font-bold uppercase tracking-wider">Detected Code</p>
                <h3 id="scanned-result" class="text-xl font-mono text-indigo-900 break-all">-</h3>
                
                <div class="mt-4 space-y-3">
                    <input type="text" id="item-name" placeholder="Item Name (e.g. Blue Widget)" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button onclick="saveItem()" class="w-full bg-indigo-600 text-white font-bold py-2 rounded-lg hover:bg-indigo-700 transition">
                        Snap to Stock
                    </button>
                </div>
            </div>
        </section>

        <!-- Stock List -->
        <section class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-lg font-semibold">Current Inventory</h2>
                <button onclick="clearStock()" class="text-xs text-red-500 hover:underline">Clear All</button>
            </div>
            
            <div id="stock-list" class="space-y-3">
                <!-- Items will appear here -->
                <p class="text-center text-gray-400 py-10 italic">No stock snapped yet...</p>
            </div>
        </section>
    </main>

    <script>
        let html5QrCode;
        let inventory = JSON.parse(localStorage.getItem('stock-snap-data')) || [];

        // Initialize Scanner
        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
                .catch(err => {
                    document.getElementById('scanner-status').innerText = "Camera Error";
                    console.error(err);
                });
        }

        function onScanSuccess(decodedText) {
            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('scanned-result').innerText = decodedText;
            document.getElementById('scanner-status').innerText = "Code Found!";
            
            // Short vibration if supported
            if (navigator.vibrate) navigator.vibrate(100);
        }

        function saveItem() {
            const code = document.getElementById('scanned-result').innerText;
            const name = document.getElementById('item-name').value || "Unnamed Item";
            
            if (!code) return;

            const newItem = {
                id: Date.now(),
                code: code,
                name: name,
                date: new Date().toLocaleString()
            };

            inventory.unshift(newItem);
            localStorage.setItem('stock-snap-data', JSON.stringify(inventory));
            
            // Reset UI
            document.getElementById('item-name').value = "";
            document.getElementById('result-card').classList.add('hidden');
            document.getElementById('scanner-status').innerText = "Ready to Scan";
            
            renderInventory();
        }

        function renderInventory() {
            const list = document.getElementById('stock-list');
            if (inventory.length === 0) {
                list.innerHTML = `<p class="text-center text-gray-400 py-10 italic">No stock snapped yet...</p>`;
                return;
            }

            list.innerHTML = inventory.map(item => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center animate-slide-in">
                    <div>
                        <h4 class="font-bold text-gray-900">${item.name}</h4>
                        <p class="text-xs font-mono text-gray-500">${item.code}</p>
                        <p class="text-[10px] text-gray-400 mt-1">${item.date}</p>
                    </div>
                    <div class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">
                        IN STOCK
                    </div>
                </div>
            `).join('');
        }

        function clearStock() {
            if(confirm("Wipe inventory?")) {
                inventory = [];
                localStorage.clear();
                renderInventory();
            }
        }

        // Run on load
        window.onload = () => {
            startScanner();
            renderInventory();
        };
    </script>

    <style>
        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
